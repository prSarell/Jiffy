<!-- 
File: /jiffy/pages/home/index.html
Purpose: A minimal version of jiffy’s home page to test horizontal scrolling with colored items.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- iOS-specific meta tags for PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Scroll Test">
  <title>Horizontal Scroll Test App</title>
  <!-- Link to manifest.json -->
  <link rel="manifest" href="/jiffy/manifest.json">
  <!-- Link to icons for iOS, aligned with manifest.json -->
  <link rel="apple-touch-icon" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <link rel="apple-touch-icon-precomposed" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #f0f0f0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #placeholder-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background-color: green;
      z-index: 30;
    }

    .scroll-container {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      padding: 16px;
      gap: 16px;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x pinch-zoom;
      width: 100%;
      overscroll-behavior-x: contain;
      position: absolute;
      top: 50px;
      bottom: 20px;
      height: 232px; /* 200px height + 16px padding top/bottom */
    }

    .scroll-item {
      flex: 0 0 80%;
      height: 200px;
      border-radius: 8px;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      font-weight: bold;
      -webkit-user-select: none;
      user-select: none;
    }

    .scroll-item:nth-child(1) { background-color: #ff6b6b; }
    .scroll-item:nth-child(2) { background-color: #4ecdc4; }
    .scroll-item:nth-child(3) { background-color: #45b7d1; }
    .scroll-item:nth-child(4) { background-color: #96ceb4; }
    .scroll-item:nth-child(5) { background-color: #ffeead; }

    .scroll-container::-webkit-scrollbar {
      display: none;
    }

    .scroll-container {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    #placeholder-pagination {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 20px;
      background-color: orange;
      z-index: 40;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- Placeholder for Header and Action Buttons -->
  <div id="placeholder-header"></div>

  <div class="scroll-container" id="scrollContainer">
    <div class="scroll-item">Item 1</div>
    <div class="scroll-item">Item 2</div>
    <div class="scroll-item">Item 3</div>
    <div class="scroll-item">Item 4</div>
    <div class="scroll-item">Item 5</div>
  </div>

  <!-- Placeholder for Pagination Dots -->
  <div id="placeholder-pagination"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const scrollContainer = document.getElementById('scrollContainer');

      // Prevent pinch-to-zoom and double-tap zoom on iPhone
      document.addEventListener('gesturestart', (e) => {
        e.preventDefault();
      });

      // Restore original touch scrolling with momentum from Step 62
      let isScrolling = false;
      let startX = 0;
      let scrollLeft = 0;

      scrollContainer.addEventListener('touchstart', (e) => {
        startX = e.touches[0].pageX - scrollLeft;
        isScrolling = true;
      });

      scrollContainer.addEventListener('touchmove', (e) => {
        if (!isScrolling) return;
        e.preventDefault();
        const x = e.touches[0].pageX;
        scrollLeft = x - startX;
        scrollContainer.scrollLeft = scrollLeft;
      });

      scrollContainer.addEventListener('touchend', () => {
        isScrolling = false;
      });

      // Add console logging for debugging
      console.log("jiffy: Page loaded at", new Date());
      console.log("jiffy: Checking PWA setup...");
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        console.log("jiffy: Running in standalone mode");
      } else {
        console.error("jiffy: NOT running in standalone mode");
      }
      console.log("jiffy: Checking scroll container...");
      const scrollItems = document.querySelectorAll(".scroll-item");
      const headerPlaceholder = document.getElementById("placeholder-header");
      const paginationPlaceholder = document.getElementById("placeholder-pagination");
      if (scrollContainer) {
        console.log("jiffy: Scroll container found, bounding rect:", scrollContainer.getBoundingClientRect());
      } else {
        console.error("jiffy: Scroll container not found!");
      }
      if (scrollItems.length > 0) {
        scrollItems.forEach((item, index) => {
          console.log(`jiffy: Scroll item ${index + 1} found, bounding rect:`, item.getBoundingClientRect());
        });
      } else {
        console.error("jiffy: Scroll items not found!");
      }
      if (headerPlaceholder) {
        console.log("jiffy: Header placeholder found, bounding rect:", headerPlaceholder.getBoundingClientRect());
      } else {
        console.error("jiffy: Header placeholder not found!");
      }
      if (paginationPlaceholder) {
        console.log("jiffy: Pagination placeholder found, bounding rect:", paginationPlaceholder.getBoundingClientRect());
      } else {
        console.error("jiffy: Pagination placeholder not found!");
      }
    });
  </script>
</body>
</html>
