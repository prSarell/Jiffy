<!-- 
File: /jiffy/pages/home/index.html
Purpose: Reintroducing Jiffy design and layout for example categories and action buttons, with a grid of categories in the horizontal scroll container using Swiper.js.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <!-- iOS-specific meta tags for PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Scroll Test">
  <title>Horizontal Scroll Test App</title>
  <!-- Link to manifest.json -->
  <link rel="manifest" href="/jiffy/manifest.json">
  <!-- Link to icons for iOS, aligned with manifest.json -->
  <link rel="apple-touch-icon" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <link rel="apple-touch-icon-precomposed" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <!-- Swiper.js CSS via CDN -->
  <link rel="stylesheet" href="https://unpkg.com/swiper@10/swiper-bundle.min.css" id="swiper-css">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #000000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #title-bar {
      position: fixed;
      top: 5px;
      left: 0;
      width: 100%;
      height: 110px;
      background-color: #000000;
      z-index: 30;
      padding-top: 35px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #header-content {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-top: 9px;
      width: 100%;
    }

    #select-button {
      position: absolute;
      left: 8px;
      font-size: 8px;
      font-weight: 400;
      color: #ffffff;
      cursor: pointer;
      padding: 8px;
    }

    #app-title {
      font-size: 19px;
      font-weight: 400;
      color: #ffffff;
      text-align: center;
    }

    #burger-menu {
      position: absolute;
      right: 8px;
      font-size: 24px;
      color: #ffffff;
      cursor: pointer;
      padding: 8px;
      line-height: 24px;
    }

    #action-buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 16px;
    }

    .action-button-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .action-button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #96CEB4;
      border: 2px solid #45B7D1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .action-button-label {
      font-size: 8px;
      font-weight: 400;
      color: #ffffff;
      text-align: center;
    }

    .swiper {
      width: 100%;
      position: absolute;
      top: 115px;
      bottom: 20px;
      padding: 12px;
      touch-action: pan-x pinch-zoom;
      overflow: hidden;
    }

    .swiper-wrapper {
      height: 100%;
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      align-content: center;
    }

    .swiper-slide {
      width: 192px; /* 4 categories × (40px button + 8px gap) = 4 × 48px */
      height: 52px; /* 40px button + 4px gap + 8px label */
      margin-bottom: 12px; /* Gap between rows */
      display: grid;
      grid-template-columns: repeat(4, 48px); /* 4 columns, each 48px (40px button + 8px gap) */
      grid-gap: 0 8px; /* 8px gap between columns */
      justify-content: center;
      align-items: start;
      -webkit-user-select: none;
      user-select: none;
    }

    .category-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .category-button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .category-button:nth-child(1) { background-color: #ff6b6b; } /* Home */
    .category-button:nth-child(2) { background-color: #4ecdc4; } /* Life */
    .category-button:nth-child(3) { background-color: #45b7d1; } /* Work */
    .category-button:nth-child(4) { background-color: #96ceb4; } /* School */
    .category-button:nth-child(5) { background-color: #ffeead; } /* Health */
    .category-button:nth-child(6) { background-color: #d4a5a5; } /* Fitness */
    .category-button:nth-child(7) { background-color: #9b59b6; } /* Hobbies */
    .category-button:nth-child(8) { background-color: #3498db; } /* Social */
    .category-button:nth-child(9) { background-color: #e74c3c; } /* Family */
    .category-button:nth-child(10) { background-color: #1abc9c; } /* Friends */
    .category-button:nth-child(11) { background-color: #f1c40f; } /* Travel */
    .category-button:nth-child(12) { background-color: #2ecc71; } /* Finance */
    .category-button:nth-child(13) { background-color: #e67e22; } /* Study */
    .category-button:nth-child(14) { background-color: #34495e; } /* Projects */
    .category-button:nth-child(15) { background-color: #ff85a2; } /* Goals */
    .category-button:nth-child(16) { background-color: #7f8c8d; } /* Errands */
    .category-button:nth-child(17) { background-color: #9adbc5; } /* Chores */
    .category-button:nth-child(18) { background-color: #f39c12; } /* Events */
    .category-button:nth-child(19) { background-color: #bdc3c7; } /* Relax */
    .category-button:nth-child(20) { background-color: #8e44ad; } /* Other */

    .category-label {
      margin-top: 4px;
      font-size: 8px;
      font-weight: 400;
      color: #ffffff;
      text-align: center;
    }

    .swiper-pagination {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 20px;
      z-index: 40;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: transparent;
    }

    .swiper-pagination-bullet {
      width: 8px;
      height: 8px;
      background-color: #ffffff;
      opacity: 0.5;
      margin: 0 4px;
    }

    .swiper-pagination-bullet-active {
      background-color: #ff6b6b;
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- Header with Select Button, Title, Burger Menu, and Action Buttons -->
  <div id="title-bar">
    <div id="header-content">
      <div id="select-button" onclick="console.log('Select button clicked')">select</div>
      <div id="app-title">Jiffy</div>
      <div id="burger-menu" onclick="console.log('Burger menu clicked')">☰</div>
    </div>
    <div id="action-buttons">
      <div class="action-button-container">
        <button id="prompts-button" class="action-button" onclick="console.log('Prompts button clicked')"></button>
        <div class="action-button-label">Prompts</div>
      </div>
      <div class="action-button-container">
        <button id="rewards-button" class="action-button" onclick="console.log('Rewards button clicked')"></button>
        <div class="action-button-label">Rewards</div>
      </div>
      <div class="action-button-container">
        <button id="add-button" class="action-button" onclick="console.log('Add button clicked')"></button>
        <div class="action-button-label">Add</div>
      </div>
    </div>
  </div>

  <!-- Swiper.js container -->
  <div class="swiper" id="scrollSwiper">
    <div class="swiper-wrapper">
      <!-- Row 1 -->
      <div class="swiper-slide">
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Home</div>
        </div>
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Life</div>
        </div>
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Work</div>
        </div>
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">School</div>
        </div>
      </div>
      <!-- Row 2 -->
      <div class="swiper-slide">
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Health</div>
        </div>
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Fitness</div>
        </div>
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Hobbies</div>
        </div>
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Social</div>
        </div>
      </div>
      <!-- Row 3 -->
      <div class="swiper-slide">
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Family</div>
        </div>
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Friends</div>
        </div>
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Travel</div>
        </div>
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Finance</div>
        </div>
      </div>
      <!-- Row 4 -->
      <div class="swiper-slide">
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Study</div>
        </div>
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Projects</div>
        </div>
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Goals</div>
        </div>
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Errands</div>
        </div>
      </div>
      <!-- Row 5 -->
      <div class="swiper-slide">
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Chores</div>
        </div>
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Events</div>
        </div>
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Relax</div>
        </div>
        <div class="category-container">
          <div class="category-button"></div>
          <div class="category-label">Other</div>
        </div>
      </div>
    </div>
    <!-- Swiper Pagination -->
    <div class="swiper-pagination"></div>
  </div>

  <!-- Swiper.js via CDN -->
  <script src="https://unpkg.com/swiper@10/swiper-bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Initialize Swiper with pagination
      const swiper = new Swiper('#scrollSwiper', {
        slidesPerView: 'auto',
        spaceBetween: 0, /* No horizontal gap between slides, handled by grid-gap */
        centeredSlides: false,
        slideToClickedSlide: true,
        grabCursor: true,
        direction: 'vertical', /* Vertical scrolling for rows */
        pagination: {
          el: '.swiper-pagination',
          clickable: true
        }
      });

      // Add console logging for debugging
      console.log("jiffy: Page loaded at", new Date());
      console.log("jiffy: Checking PWA setup...");
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        console.log("jiffy: Running in standalone mode");
      } else {
        console.error("jiffy: NOT running in standalone mode");
      }
      console.log("jiffy: Checking swiper container...");
      const swiperContainer = document.getElementById("scrollSwiper");
      const swiperSlides = document.querySelectorAll(".swiper-slide");
      const titleBar = document.getElementById("title-bar");
      const pagination = document.querySelector(".swiper-pagination");
      if (swiperContainer) {
        console.log("jiffy: Swiper container found, bounding rect:", swiperContainer.getBoundingClientRect());
      } else {
        console.error("jiffy: Swiper container not found!");
      }
      if (swiperSlides.length > 0) {
        swiperSlides.forEach((slide, index) => {
          console.log(`jiffy: Swiper slide ${index + 1} found, bounding rect:`, slide.getBoundingClientRect());
        });
      } else {
        console.error("jiffy: Swiper slides not found!");
      }
      if (titleBar) {
        console.log("jiffy: Title bar found, bounding rect:", titleBar.getBoundingClientRect());
      } else {
        console.error("jiffy: Title bar not found!");
      }
      if (pagination) {
        console.log("jiffy: Pagination found, bounding rect:", pagination.getBoundingClientRect());
      } else {
        console.error("jiffy: Pagination not found!");
      }
    });
  </script>
</body>
</html>
