<!-- 
File: /jiffy/pages/home/index.html
Purpose: Jiffy’s homepage with a 4x5 grid of 20 categories using Swiper.js, including header and action buttons.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <!-- iOS-specific meta tags for PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jiffy">
  <title>Jiffy Homepage</title>
  <!-- Link to manifest.json -->
  <link rel="manifest" href="/manifest.json">
  <!-- Link to icons for iOS -->
  <link rel="apple-touch-icon" href="/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" href="/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/assets/icon-512.png">
  <link rel="apple-touch-icon-precomposed" sizes="512x512" href="/assets/icon-512.png">
  <!-- Swiper.js CSS via CDN -->
  <link rel="stylesheet" href="https://unpkg.com/swiper@10/swiper-bundle.min.css" id="swiper-css">
  <!-- Link to styles -->
  <link rel="stylesheet" href="/shared/styles.css">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #000000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #title-bar {
      position: fixed;
      top: 5px;
      left: 0;
      width: 100%;
      height: 110px;
      background-color: #000000;
      z-index: 30;
      padding-top: 35px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #header-content {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-top: 9px;
      width: 100%;
    }

    #select-button {
      position: absolute;
      left: 8px;
      font-size: 8px;
      font-weight: 400;
      color: #ffffff;
      cursor: pointer;
      padding: 8px;
    }

    #app-title {
      font-size: 19px;
      font-weight: 400;
      color: #ffffff;
      text-align: center;
    }

    #burger-menu {
      position: absolute;
      right: 8px;
      font-size: 24px;
      color: #ffffff;
      cursor: pointer;
      padding: 8px;
      line-height: 24px;
    }

    #action-buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 16px;
    }

    .action-button-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .action-button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #96CEB4;
      border: 2px solid #45B7D1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .action-button-label {
      font-size: 8px;
      font-weight: 400;
      color: #ffffff;
      text-align: center;
    }

    .swiper {
      width: 100%;
      position: absolute;
      top: 115px;
      bottom: 20px;
      padding: 12px;
      touch-action: pan-x pinch-zoom;
      overflow: hidden;
    }

    .swiper-wrapper {
      height: 100%;
    }

    .swiper-slide {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      -webkit-user-select: none;
      user-select: none;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 15px;
      width: 100%;
      max-width: 1000px;
    }

    .category-item {
      width: 100%;
      height: 100px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 16px;
    }

    .swiper-pagination {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 20px;
      z-index: 40;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: transparent;
    }

    .swiper-pagination-bullet {
      width: 8px;
      height: 8px;
      background-color: #ffffff;
      opacity: 0.5;
      margin: 0 4px;
    }

    .swiper-pagination-bullet-active {
      background-color: #ff6b6b;
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- Header with Select Button, Title, Burger Menu, and Action Buttons -->
  <div id="title-bar">
    <div id="header-content">
      <div id="select-button" onclick="console.log('Select button clicked')">select</div>
      <div id="app-title">Jiffy</div>
      <div id="burger-menu" onclick="console.log('Burger menu clicked')">☰</div>
    </div>
    <div id="action-buttons">
      <div class="action-button-container">
        <button id="prompts-button" class="action-button" onclick="console.log('Prompts button clicked')"></button>
        <div class="action-button-label">Prompts</div>
      </div>
      <div class="action-button-container">
        <button id="rewards-button" class="action-button" onclick="console.log('Rewards button clicked')"></button>
        <div class="action-button-label">Rewards</div>
      </div>
      <div class="action-button-container">
        <button id="add-button" class="action-button" onclick="console.log('Add button clicked')"></button>
        <div class="action-button-label">Add</div>
      </div>
    </div>
  </div>

  <!-- Swiper.js container -->
  <div class="swiper" id="scrollSwiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide">
        <div class="category-grid">
          <div class="category-item">Home</div>
          <div class="category-item">Life</div>
          <div class="category-item">School</div>
          <div class="category-item">Work</div>
          <div class="category-item">Dreams</div>
          <div class="category-item">Hobbies</div>
          <div class="category-item">Goals</div>
          <div class="category-item">Events</div>
          <div class="category-item">Projects</div>
          <div class="category-item">Ideas</div>
          <div class="category-item">Plans</div>
          <div class="category-item">Chores</div>
          <div class="category-item">Errands</div>
          <div class="category-item">Habits</div>
          <div class="category-item">Routines</div>
          <div class="category-item">Adventures</div>
          <div class="category-item">Memories</div>
          <div class="category-item">Skills</div>
          <div class="category-item">Wishlist</div>
          <div class="category-item">Inspiration</div>
        </div>
      </div>
    </div>
    <div class="swiper-pagination"></div>
  </div>

  <!-- Swiper.js via CDN -->
  <script src="https://unpkg.com/swiper@10/swiper-bundle.min.js"></script>
  <script src="/shared/scripts/categoryManagement.js"></script>
  <script src="/shared/scripts/eventHandlers.js"></script>
  <script src="/shared/scripts/popupManager.js"></script>
  <script src="/main.js"></script>
</body>
</html>
