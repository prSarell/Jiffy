<!-- 
File: /jiffy/pages/home/index.html
Purpose: A minimal version of jiffy’s home page to focus on fixing horizontal scrolling. It includes:
  - Category Buttons: Dynamically generated, swipeable horizontally, with predefined colors (example categories: Home, Life, Work, School).
Future steps will reintroduce other elements incrementally.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>jiffy - ADHD Task Manager</title>
  <link rel="apple-touch-icon" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <link rel="apple-touch-icon-precomposed" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <link rel="stylesheet" href="/jiffy/shared/styles/styles.css">
</head>
<body>
  <!-- Categories and Colors Section -->
  <div id="category-container">
    <!-- Categories will be dynamically added by JavaScript -->
  </div>

  <!-- Import eventHandlers.js -->
  <script src="/jiffy/shared/scripts/eventHandlers.js"></script>

  <script>
    // Create category buttons on page load
    setupCategories();

    console.log("jiffy: Page loaded at", new Date());
    console.log("jiffy: Checking PWA setup...");
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
      console.log("jiffy: Running in standalone mode");
    } else {
      console.error("jiffy: NOT running in standalone mode");
    }
    console.log("jiffy: Checking category container...");
    const categoryContainer = document.getElementById("category-container");
    if (categoryContainer) {
      console.log("jiffy: Category container found, child elements:", categoryContainer.children);
      console.log("jiffy: Category container bounding rect:", categoryContainer.getBoundingClientRect());
    } else {
      console.error("jiffy: Category container not found!");
    }
  </script>
</body>
</html>
