<!-- 
File: /jiffy/pages/home/index.html
Purpose: A minimal version of jiffy’s home page to test rendering a blue circle in the center of the screen.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>jiffy - ADHD Task Manager</title>
  <link rel="apple-touch-icon" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <link rel="apple-touch-icon-precomposed" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #blue-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%); /* Center the circle precisely */
      width: 100px;
      height: 100px;
      background-color: blue;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <!-- Blue Circle (Centered) -->
  <div id="blue-circle"></div>

  <script>
    try {
      console.log("jiffy: Page loaded at", new Date());
      console.log("jiffy: Checking PWA setup...");
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        console.log("jiffy: Running in standalone mode");
      } else {
        console.error("jiffy: NOT running in standalone mode");
      }
      console.log("jiffy: Checking blue circle...");
      const blueCircle = document.getElementById("blue-circle");
      if (blueCircle) {
        console.log("jiffy: Blue circle found, bounding rect:", blueCircle.getBoundingClientRect());
      } else {
        console.error("jiffy: Blue circle not found!");
      }
    } catch (error) {
      console.error("jiffy: Error during initialization:", error);
    }
  </script>
</body>
</html>
