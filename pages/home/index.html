<!-- 
File: /jiffy/pages/home/index.html
Purpose: A minimal version of jiffy’s home page to test horizontal scrolling with a blue circle placeholder:
  - Blue Circle (center): Placeholder for categories (horizontally scrollable).
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>jiffy - ADHD Task Manager</title>
  <link rel="apple-touch-icon" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <link rel="apple-touch-icon-precomposed" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #placeholder-categories {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
      justify-content: center;
      min-width: 600px; /* Force overflow to ensure scrolling */
      will-change: scroll-position;
      border: 1px solid white; /* For visibility */
    }

    #placeholder-categories::-webkit-scrollbar {
      display: none;
    }

    #blue-circle {
      width: 100px;
      height: 100px;
      background-color: blue;
      border: 2px solid white;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    #test-text {
      color: white;
      font-size: 16px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <!-- Blue Circle (Centered, Scrollable) -->
  <div id="placeholder-categories">
    <div id="blue-circle"></div>
  </div>
  <div id="test-text">Test Text</div>

  <script>
    try {
      console.log("jiffy: Page loaded at", new Date());
      console.log("jiffy: Checking PWA setup...");
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        console.log("jiffy: Running in standalone mode");
      } else {
        console.error("jiffy: NOT running in standalone mode");
      }
      console.log("jiffy: Checking elements...");
      const placeholderCategories = document.getElementById("placeholder-categories");
      const blueCircle = document.getElementById("blue-circle");
      const testText = document.getElementById("test-text");
      if (placeholderCategories) {
        console.log("jiffy: Categories placeholder found, bounding rect:", placeholderCategories.getBoundingClientRect());
      } else {
        console.error("jiffy: Categories placeholder not found!");
      }
      if (blueCircle) {
        console.log("jiffy: Blue circle found, bounding rect:", blueCircle.getBoundingClientRect());
      } else {
        console.error("jiffy: Blue circle not found!");
      }
      if (testText) {
        console.log("jiffy: Test text found, bounding rect:", testText.getBoundingClientRect());
      } else {
        console.error("jiffy: Test text not found!");
      }
    } catch (error) {
      console.error("jiffy: Error during initialization:", error);
    }
  </script>
</body>
</html>
