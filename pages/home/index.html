<!-- 
File: /jiffy/pages/home/index.html
Purpose: A minimal version of jiffy’s home page to test horizontal scrolling with colored squares using Swiper.js.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- iOS-specific meta tags for PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Scroll Test">
  <title>Horizontal Scroll Test App</title>
  <!-- Link to manifest.json -->
  <link rel="manifest" href="/jiffy/manifest.json">
  <!-- Link to icons for iOS, aligned with manifest.json -->
  <link rel="apple-touch-icon" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <link rel="apple-touch-icon-precomposed" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <!-- Swiper.js CSS via CDN -->
  <link rel="stylesheet" href="https://unpkg.com/swiper@10/swiper-bundle.min.css" id="swiper-css">
  <link rel="stylesheet" href="/jiffy/shared/styles/styles.css">
</head>
<body>
  <!-- Placeholder for Header and Action Buttons -->
  <div id="placeholder-header"></div>

  <!-- Swiper.js container -->
  <div class="swiper" id="scrollSwiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide">
        <div class="category-square">Item 1</div>
      </div>
      <div class="swiper-slide">
        <div class="category-square">Item 2</div>
      </div>
      <div class="swiper-slide">
        <div class="category-square">Item 3</div>
      </div>
      <div class="swiper-slide">
        <div class="category-square">Item 4</div>
      </div>
      <div class="swiper-slide">
        <div class="category-square">Item 5</div>
      </div>
    </div>
  </div>

  <!-- Placeholder for Pagination Dots -->
  <div id="placeholder-pagination"></div>

  <!-- Swiper.js via CDN -->
  <script src="https://unpkg.com/swiper@10/swiper-bundle.min.js"></script>
  <script src="/jiffy/shared/scripts/eventHandlers.js"></script>
</body>
</html>
