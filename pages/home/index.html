<!-- 
File: /jiffy/pages/home/index.html
Purpose: A minimal version of jiffy’s home page to test horizontal scrolling with colored circles.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>jiffy - Horizontal Scroll Test</title>
  <link rel="apple-touch-icon" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <link rel="apple-touch-icon-precomposed" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <link rel="stylesheet" href="/jiffy/shared/styles/styles.css">
</head>
<body>
  <!-- Container for Horizontal Scrolling Test -->
  <div id="scroll-container">
    <!-- Circles will be added dynamically by JavaScript -->
  </div>

  <!-- Import eventHandlers.js -->
  <script src="/jiffy/shared/scripts/eventHandlers.js"></script>

  <script>
    try {
      setupScrollTest();

      console.log("jiffy: Page loaded at", new Date());
      console.log("jiffy: Checking PWA setup...");
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        console.log("jiffy: Running in standalone mode");
      } else {
        console.error("jiffy: NOT running in standalone mode");
      }
      console.log("jiffy: Checking scroll container...");
      const scrollContainer = document.getElementById("scroll-container");
      const scrollCircles = document.querySelectorAll(".scroll-circle");
      if (scrollContainer) {
        console.log("jiffy: Scroll container found, bounding rect:", scrollContainer.getBoundingClientRect());
      } else {
        console.error("jiffy: Scroll container not found!");
      }
      if (scrollCircles.length > 0) {
        scrollCircles.forEach((circle, index) => {
          console.log(`jiffy: Scroll circle ${index + 1} found, bounding rect:`, circle.getBoundingClientRect());
        });
      } else {
        console.error("jiffy: Scroll circles not found!");
      }
    } catch (error) {
      console.error("jiffy: Error during initialization:", error);
    }
  </script>
</body>
</html>
