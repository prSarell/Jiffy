<!-- 
File: /jiffy/pages/home/index.html
Purpose: This file serves as the main entry point for jiffy’s home page after the redirect from /jiffy/index.html. It sets up the PWA configuration (manifest, meta tags, icon links) to ensure the app launches in full-screen mode with the correct icon on the Home Screen. It contains the core UI elements of the app, which are being rebuilt step by step for maximum stability. Currently, it includes:
  - Header Section: Select text (left-aligned), jiffy title (centered), Hamburger Menu (right-aligned).
  - Action Buttons: Prompts, Rewards, and Add buttons (centered below the header, circular, light green background with blue outline).
  - Category Buttons: Dynamically generated, swipeable horizontally, centered below action buttons, with predefined colors (example categories: Home, Life, Work, School).
  - Pagination Dots: White dots at the bottom to indicate the number of categories and highlight the active one during scrolling.
Future steps will add more elements incrementally.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>jiffy - ADHD Task Manager</title>
  <link rel="apple-touch-icon" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <link rel="apple-touch-icon-precomposed" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <link rel="stylesheet" href="/jiffy/shared/styles/styles.css"> <!-- Link to external styles.css -->
</head>
<body>
  <!-- Header Section -->
  <header>
    <span id="select-button">Select</span>
    <h1 class="jiffy-title">jiffy</h1>
    <button class="hamburger-menu">☰</button>
  </header>

  <!-- Action Buttons Section -->
  <div id="button-container">
    <div class="button-item">
      <span id="prompts-button"></span>
      <span class="button-label">Prompts</span>
    </div>
    <div class="button-item">
      <span id="rewards-button"></span>
      <span class="button-label">Rewards</span>
    </div>
    <div class="button-item">
      <span id="add-button"></span>
      <span class="button-label">Add</span>
    </div>
  </div>

  <!-- Categories and Colors Section -->
  <div id="category-container">
    <!-- Categories will be dynamically added by JavaScript -->
  </div>

  <!-- Pagination Dots -->
  <div id="pagination-container">
    <!-- Dots will be dynamically added by JavaScript -->
  </div>

  <!-- Import eventHandlers.js -->
  <script src="/jiffy/shared/scripts/eventHandlers.js"></script>

  <script>
    // Initial categories (example categories for testing user-created functionality)
    let categories = [
      { name: "Home", color: "#1E3A8A" },
      { name: "Life", color: "#3B82F6" },
      { name: "Work", color: "#60A5FA" },
      { name: "School", color: "#93C5FD" }
    ];

    // Load categories from localStorage if available
    const savedCategories = localStorage.getItem("jiffyCategories");
    console.log("jiffy: Loading categories from localStorage:", savedCategories);
    if (savedCategories) {
      try {
        categories = JSON.parse(savedCategories);
        console.log("jiffy: Successfully loaded categories:", categories);
      } catch (error) {
        console.error("jiffy: Failed to parse categories from localStorage:", error);
        // Reset to default if parsing fails
        localStorage.setItem("jiffyCategories", JSON.stringify(categories));
      }
    } else {
      // Save initial categories to localStorage if none exist
      console.log("jiffy: No categories in localStorage, saving initial set");
      localStorage.setItem("jiffyCategories", JSON.stringify(categories));
    }

    // Dynamically position the category container below the action buttons
    function positionCategoryContainer() {
      const buttonContainer = document.getElementById("button-container");
      const categoryContainer = document.getElementById("category-container");
      const buttonContainerRect = buttonContainer.getBoundingClientRect();
      const topPosition = buttonContainerRect.bottom + 10; // Add 10px margin below action buttons
      categoryContainer.style.top = `${topPosition}px`;
      console.log("jiffy: Positioned category container at top:", topPosition);
    }

    // Function to dynamically create category buttons
    function createCategoryButtons() {
      const categoryContainer = document.getElementById("category-container");
      categoryContainer.innerHTML = ''; // Clear existing buttons
      categories.forEach(category => {
        const categoryItem = document.createElement("div");
        categoryItem.className = "category-item";

        const categoryButton = document.createElement("span");
        categoryButton.className = "category-button";
        categoryButton.style.backgroundColor = category.color;

        const categoryLabel = document.createElement("span");
        categoryLabel.className = "category-label";
        categoryLabel.textContent = category.name;

        categoryItem.appendChild(categoryButton);
        categoryItem.appendChild(categoryLabel);
        categoryContainer.appendChild(categoryItem);
      });

      // Create pagination dots
      createPaginationDots();
      updateActiveDot(); // Initial update

      // Apply touch event restrictions after rendering categories
      restrictCategoryScrolling();
    }

    // Function to create pagination dots
    function createPaginationDots() {
      const paginationContainer = document.getElementById("pagination-container");
      paginationContainer.innerHTML = ''; // Clear existing dots
      categories.forEach((_, index) => {
        const dot = document.createElement("span");
        dot.className = "pagination-dot";
        dot.dataset.index = index;
        paginationContainer.appendChild(dot);
      });
      console.log("jiffy: Pagination dots created, count:", categories.length);
    }

    // Function to update active pagination dot
    function updateActiveDot() {
      const categoryContainer = document.getElementById("category-container");
      const scrollPosition = categoryContainer.scrollLeft;
      const categoryWidth = 40 + 14; // Width of category button (40px) + gap (14px)
      const activeIndex = Math.round(scrollPosition / categoryWidth);

      const dots = document.querySelectorAll(".pagination-dot");
      dots.forEach((dot, index) => {
        dot.classList.toggle("active", index === activeIndex);
      });
    }

    // Add scroll event listener to update active dot
    document.getElementById("category-container").addEventListener("scroll", updateActiveDot);

    // Function to add a new category
    function addCategory(name, color) {
      categories.push({ name, color });
      console.log("jiffy: Adding category, new list:", categories);
      localStorage.setItem("jiffyCategories", JSON.stringify(categories));
      console.log("jiffy: Updated localStorage after adding:", localStorage.getItem("jiffyCategories"));
      createCategoryButtons();
    }

    // Function to remove a category
    function removeCategory(name) {
      const index = categories.findIndex(category => category.name === name);
      if (index !== -1) {
        categories.splice(index, 1);
        console.log("jiffy: Removing category, new list:", categories);
        localStorage.setItem("jiffyCategories", JSON.stringify(categories));
        console.log("jiffy: Updated localStorage after removing:", localStorage.getItem("jiffyCategories"));
        createCategoryButtons();
      }
    }

    // Make the Add button functional
    const addButton = document.getElementById("add-button");
    addButton.addEventListener("click", () => {
      const name = prompt("Enter category name:");
      if (name) {
        const color = prompt("Enter color (e.g., #FF0000):", "#FF0000");
        if (color) {
          addCategory(name, color);
        }
      }
    });

    // Create category buttons on page load and position the container
    createCategoryButtons();
    positionCategoryContainer();

    // Reposition on window resize (e.g., orientation change)
    window.addEventListener("resize", positionCategoryContainer);

    console.log("jiffy: Page loaded at", new Date());
    console.log("jiffy: Checking PWA setup...");
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
      console.log("jiffy: Running in standalone mode");
    } else {
      console.error("jiffy: NOT running in standalone mode");
    }
    console.log("jiffy: Checking button container...");
    const buttonContainer = document.getElementById("button-container");
    if (buttonContainer) {
      console.log("jiffy: Button container found, child elements:", buttonContainer.children);
      console.log("jiffy: Button container bounding rect:", buttonContainer.getBoundingClientRect());
    } else {
      console.error("jiffy: Button container not found!");
    }
    console.log("jiffy: Checking category container...");
    const categoryContainer = document.getElementById("category-container");
    if (categoryContainer) {
      console.log("jiffy: Category container found, child elements:", categoryContainer.children);
      console.log("jiffy: Category container bounding rect:", categoryContainer.getBoundingClientRect());
    } else {
      console.error("jiffy: Category container not found!");
    }
  </script>
</body>
</html>
