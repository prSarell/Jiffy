<!-- 
File: /jiffy/pages/home/index.html
Purpose: A minimal version of jiffy’s home page to test horizontal scrolling with colored squares using Swiper.js.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- iOS-specific meta tags for PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Scroll Test">
  <title>Horizontal Scroll Test App</title>
  <!-- Link to manifest.json -->
  <link rel="manifest" href="/jiffy/manifest.json">
  <!-- Link to icons for iOS, aligned with manifest.json -->
  <link rel="apple-touch-icon" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <link rel="apple-touch-icon-precomposed" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <!-- Swiper.js CSS via CDN -->
  <link rel="stylesheet" href="https://unpkg.com/swiper@10/swiper-bundle.min.css" id="swiper-css">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #000000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #title-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 110px;
      background-color: #333;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #burger-menu {
      position: absolute;
      left: 16px;
      font-size: 24px;
      color: #ffffff;
      cursor: pointer;
      padding: 8px;
    }

    #app-title {
      font-size: 32px;
      font-weight: bold;
      color: #ffffff;
      text-align: center;
    }

    .swiper {
      width: 100%;
      position: absolute;
      top: 110px;
      bottom: 20px;
      padding: 16px;
      touch-action: pan-x pinch-zoom;
      overflow: hidden;
    }

    .swiper-wrapper {
      height: 100%;
    }

    .swiper-slide {
      width: 80%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-user-select: none;
      user-select: none;
    }

    .category-square {
      width: 100%;
      height: 200px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      font-weight: bold;
    }

    .category-square:nth-child(1) { background-color: #ff6b6b; }
    .category-square:nth-child(2) { background-color: #4ecdc4; }
    .category-square:nth-child(3) { background-color: #45b7d1; }
    .category-square:nth-child(4) { background-color: #96ceb4; }
    .category-square:nth-child(5) { background-color: #ffeead; }

    .swiper-pagination {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 20px;
      z-index: 40;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: transparent;
    }

    .swiper-pagination-bullet {
      width: 8px;
      height: 8px;
      background-color: #ffffff;
      opacity: 0.5;
      margin: 0 4px;
    }

    .swiper-pagination-bullet-active {
      background-color: #ff6b6b;
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- Header with Title and Burger Menu -->
  <div id="title-bar">
    <div id="burger-menu" onclick="console.log('Burger menu clicked')">☰</div>
    <div id="app-title">Jiffy</div>
  </div>

  <!-- Swiper.js container -->
  <div class="swiper" id="scrollSwiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide">
        <div class="category-square">Item 1</div>
      </div>
      <div class="swiper-slide">
        <div class="category-square">Item 2</div>
      </div>
      <div class="swiper-slide">
        <div class="category-square">Item 3</div>
      </div>
      <div class="swiper-slide">
        <div class="category-square">Item 4</div>
      </div>
      <div class="swiper-slide">
        <div class="category-square">Item 5</div>
      </div>
    </div>
    <!-- Swiper Pagination -->
    <div class="swiper-pagination"></div>
  </div>

  <!-- Swiper.js via CDN -->
  <script src="https://unpkg.com/swiper@10/swiper-bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Initialize Swiper with pagination
      const swiper = new Swiper('#scrollSwiper', {
        slidesPerView: 'auto',
        spaceBetween: 16,
        centeredSlides: false,
        slideToClickedSlide: true,
        grabCursor: true,
        pagination: {
          el: '.swiper-pagination',
          clickable: true
        }
      });

      // Add console logging for debugging
      console.log("jiffy: Page loaded at", new Date());
      console.log("jiffy: Checking PWA setup...");
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        console.log("jiffy: Running in standalone mode");
      } else {
        console.error("jiffy: NOT running in standalone mode");
      }
      console.log("jiffy: Checking swiper container...");
      const swiperContainer = document.getElementById("scrollSwiper");
      const swiperSlides = document.querySelectorAll(".swiper-slide");
      const titleBar = document.getElementById("title-bar");
      const pagination = document.querySelector(".swiper-pagination");
      if (swiperContainer) {
        console.log("jiffy: Swiper container found, bounding rect:", swiperContainer.getBoundingClientRect());
      } else {
        console.error("jiffy: Swiper container not found!");
      }
      if (swiperSlides.length > 0) {
        swiperSlides.forEach((slide, index) => {
          console.log(`jiffy: Swiper slide ${index + 1} found, bounding rect:`, slide.getBoundingClientRect());
        });
      } else {
        console.error("jiffy: Swiper slides not found!");
      }
      if (titleBar) {
        console.log("jiffy: Title bar found, bounding rect:", titleBar.getBoundingClientRect());
      } else {
        console.error("jiffy: Title bar not found!");
      }
      if (pagination) {
        console.log("jiffy: Pagination found, bounding rect:", pagination.getBoundingClientRect());
      } else {
        console.error("jiffy: Pagination not found!");
      }
    });
  </script>
</body>
</html>
