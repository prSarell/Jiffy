<!-- 
File: /jiffy/pages/home/index.html
Purpose: A minimal version of jiffy’s home page to test horizontal scrolling with placeholders:
  - Green Square (top): Placeholder for header and action buttons (fixed).
  - Blue Circles (center): Placeholder for categories (horizontally scrollable).
  - Orange Rectangle (bottom): Placeholder for pagination dots (fixed).
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>jiffy - ADHD Task Manager</title>
  <link rel="apple-touch-icon" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <link rel="apple-touch-icon-precomposed" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <link rel="stylesheet" href="/jiffy/shared/styles/styles.css">
</head>
<body>
  <!-- Placeholder for Header and Action Buttons -->
  <div id="placeholder-header"></div>

  <!-- Placeholder for Categories (Scrollable) -->
  <div id="placeholder-categories">
    <div class="blue-circle"></div>
    <div class="blue-circle"></div>
    <div class="blue-circle"></div>
    <div class="blue-circle"></div>
  </div>

  <!-- Placeholder for Pagination Dots -->
  <div id="placeholder-pagination"></div>

  <div id="test-text">Test Text</div>

  <!-- Import eventHandlers.js -->
  <script src="/jiffy/shared/scripts/eventHandlers.js"></script>

  <script>
    try {
      setupPlaceholders();

      console.log("jiffy: Page loaded at", new Date());
      console.log("jiffy: Checking PWA setup...");
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        console.log("jiffy: Running in standalone mode");
      } else {
        console.error("jiffy: NOT running in standalone mode");
      }
      console.log("jiffy: Checking elements...");
      const placeholderHeader = document.getElementById("placeholder-header");
      const placeholderCategories = document.getElementById("placeholder-categories");
      const blueCircles = document.querySelectorAll(".blue-circle");
      const placeholderPagination = document.getElementById("placeholder-pagination");
      const testText = document.getElementById("test-text");
      if (placeholderHeader) {
        console.log("jiffy: Header placeholder found, bounding rect:", placeholderHeader.getBoundingClientRect());
      } else {
        console.error("jiffy: Header placeholder not found!");
      }
      if (placeholderCategories) {
        console.log("jiffy: Categories placeholder found, bounding rect:", placeholderCategories.getBoundingClientRect());
      } else {
        console.error("jiffy: Categories placeholder not found!");
      }
      if (blueCircles.length > 0) {
        blueCircles.forEach((circle, index) => {
          console.log(`jiffy: Blue circle ${index + 1} found, bounding rect:`, circle.getBoundingClientRect());
        });
      } else {
        console.error("jiffy: Blue circles not found!");
      }
      if (placeholderPagination) {
        console.log("jiffy: Pagination placeholder found, bounding rect:", placeholderPagination.getBoundingClientRect());
      } else {
        console.error("jiffy: Pagination placeholder not found!");
      }
      if (testText) {
        console.log("jiffy: Test text found, bounding rect:", testText.getBoundingClientRect());
      } else {
        console.error("jiffy: Test text not found!");
      }
    } catch (error) {
      console.error("jiffy: Error during initialization:", error);
    }
  </script>
</body>
</html>
