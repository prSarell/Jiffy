<!-- 
File: /jiffy/pages/home/index.html
Purpose: A minimal version of jiffy’s home page to test horizontal scrolling with colored placeholders:
  - Green Square (top): Placeholder for header and action buttons (fixed).
  - Blue Circle (center): Placeholder for categories (horizontally scrollable).
  - Orange Rectangle (bottom): Placeholder for pagination dots (fixed).
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>jiffy - ADHD Task Manager</title>
  <link rel="apple-touch-icon" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/jiffy/assets/icon-180.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <link rel="apple-touch-icon-precomposed" sizes="512x512" href="/jiffy/assets/icon-512.png">
  <!-- Inline styles temporarily to rule out CSS loading issue -->
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #000000;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #placeholder-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background-color: green;
      z-index: 30;
    }

    #placeholder-categories {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
      justify-content: center;
      min-width: 600px;
      will-change: scroll-position;
    }

    #placeholder-categories::-webkit-scrollbar {
      display: none;
    }

    #blue-circle {
      width: 50px;
      height: 50px;
      background-color: blue;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    #placeholder-pagination {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 20px;
      background-color: orange;
      z-index: 40;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- Placeholder for Header and Action Buttons -->
  <div id="placeholder-header"></div>

  <!-- Placeholder for Categories (Scrollable) -->
  <div id="placeholder-categories">
    <div id="blue-circle"></div>
  </div>

  <!-- Placeholder for Pagination Dots -->
  <div id="placeholder-pagination"></div>

  <!-- Import eventHandlers.js -->
  <script src="/jiffy/shared/scripts/eventHandlers.js"></script>

  <script>
    try {
      // Initialize placeholders (no functionality needed)
      setupPlaceholders();

      console.log("jiffy: Page loaded at", new Date());
      console.log("jiffy: Checking PWA setup...");
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        console.log("jiffy: Running in standalone mode");
      } else {
        console.error("jiffy: NOT running in standalone mode");
      }
      console.log("jiffy: Checking placeholder containers...");
      const placeholderCategories = document.getElementById("placeholder-categories");
      if (placeholderCategories) {
        console.log("jiffy: Categories placeholder found, bounding rect:", placeholderCategories.getBoundingClientRect());
      } else {
        console.error("jiffy: Categories placeholder not found!");
      }
    } catch (error) {
      console.error("jiffy: Error during initialization:", error);
    }
  </script>
</body>
</html>
